front:
  text: 序達磨大士航海而來未嘗建立語言文字直指人心見性成佛至於一華開後五葉芬芳各擅家聲或升堂入室顯微闡幽皆藉言以顯妙道慣白拈而成至文令千載之下打破疑團頓入不思議境界將莖艸作金身轉金身為莖艸卷舒自在殺活全彰逼生蛇而化龍者唯臨濟宗為痛快耳雲腹禪師蜀人也為破山之裔象崖之子振曹源之宗豎滹沱之幟數十年來為法門龍象雖不以文字新天下之耳目亦不以無言祕大法之真傳故其開法川黔一皆以惡辣鉗錘本分艸料不帶枝葉而超無上者也迨後乘槎泛楚緇素遮道如失怙恃其德法相深以入人者如此庚申夏有法嗣我淨聞公從潭州齎師語錄來檇李授梓將入楞嚴附藏流通問序於余余雖未親炙面顏但與吾里古新庵清白老師交深蓋清師與雲腹禪師皆蜀人也常道其真操實履及讀其語錄行狀機趣觸法直赴橫奔于開口不得處說法從下手不得處施為天風木葉流水行雲總屬全提舉大法於一喝之中揭宗旨於辣棒之下誠令緇白咸臻祖域矣爰筆而為之序康熙庚申佛生日賜進士出身中議大夫整飭陽和道山西按察司副使加二級前廣東布政司左布政戶部右侍郎都察院左副都御史通政司左通政翰林院提督四驛館太常寺少卿太僕寺少卿河南道監察御史提督順天等處學政禾郡曹溶拜撰
